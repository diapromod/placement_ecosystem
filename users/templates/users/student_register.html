<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .illustration {
            flex: 1;
            background: #007bff;
            /* Blue background */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* prevents scrollbars */
        }

        .illustration img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* makes image scale and crop to fill */
        }

        /* Right side form */
        .form-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .register-form {
            width: 100%;
            max-width: 400px;
        }

        .register-form h2 {
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #222;
        }

        .register-form input[type="text"],
        .register-form input[type="email"],
        .register-form input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .register-form button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
        }

        .register-form button:hover {
            background: #0056b3;
        }

        .register-form p {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
        }

        .register-form p a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Left Illustration -->
        <div class="illustration">
            <img src="{% static 'images/sign_up.png' %}" alt="Illustration">
        </div>

        <!-- Right Form -->
        <div class="form-section">
            <form method="post" class="register-form">
                {% csrf_token %}
                <h2>Sign Up</h2>

                <!-- Success/Error Messages -->
                {% if messages %}
                <div class="messages mb-3">
                    {% for message in messages %}
                    <p
                        style="text-align: center; font-size: 14px; margin: 5px 0; color: {% if message.tags == 'success' %}#28a745{% else %}#dc3545{% endif %};">
                        {{ message }}
                    </p>
                    {% endfor %}
                </div>
                {% endif %}

                <!-- Resume Upload Section -->
                <div
                    style="background-color: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center;">
                    <p style="margin: 0 0 10px; font-weight: bold; color: #495057;">Use Resume to Auto-fill</p>
                    <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
                        <input type="file" id="resumeUpload" style="font-size: 12px; width: 180px;">
                        <button type="button" onclick="uploadResume()"
                            style="width: auto; margin-top: 0; padding: 8px 12px; background-color: #28a745;">Auto-fill</button>
                    </div>
                    <small id="uploadStatus" style="display: block; margin-top: 5px; color: #6c757d;"></small>
                </div>

                <!-- Hidden form for resume submission -->
                <script>
                    function uploadResume() {
                        const fileInput = document.getElementById('resumeUpload');
                        const status = document.getElementById('uploadStatus');

                        if (!fileInput.files.length) {
                            status.innerText = "Please select a file first.";
                            status.style.color = "red";
                            return;
                        }

                        status.innerText = "Uploading...";
                        status.style.color = "blue";

                        const formData = new FormData();
                        formData.append('resume', fileInput.files[0]);
                        formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

                        fetch('{% url "process_resume" %}', {
                            method: 'POST',
                            body: formData
                        })
                            .then(response => {
                                if (response.redirected) {
                                    window.location.href = response.url; // Reload page with pre-filled data
                                } else {
                                    status.innerText = "Upload failed.";
                                    status.style.color = "red";
                                }
                            })
                            .catch(error => {
                                console.error('Error:', error);
                                status.innerText = "Error uploading.";
                                status.style.color = "red";
                            });
                    }
                </script>

                <!-- Django renders fields with your custom styling -->
                {{ form.non_field_errors }}

                {% for field in form %}
                <div class="form-group">
                    {{ field.errors }}
                    {{ field }}
                </div>
                {% endfor %}

                <button type="submit">Sign Up</button>

                <p>Already have an account? <a href="{% url 'student_login' %}">Login</a></p>
            </form>
        </div>
    </div>
</body>

</html>
